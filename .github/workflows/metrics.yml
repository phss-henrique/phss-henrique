name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Roda toda meia-noite
  workflow_dispatch: # Permite rodar manualmente
push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: phss-henrique
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Plugin de Linguagens (focado no que você mais usa)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # Analisa commits e não só o tamanho dos arquivos
          
          # Estética (Dracula Theme)
          config_order: base.header, isocalendar, languages, base.activity
          palette: github
