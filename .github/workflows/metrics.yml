name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: phss-henrique
          template: classic
          
          # 🧹 LIMPANDO O INVENTÁRIO: Deixando só um cabeçalho simples
          base: header
          
          # Foco total nas linguagens que você mais usa
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, javascript
          plugin_languages_details: percentage # Remove o tamanho em bytes pra ficar mais limpo
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          # Estética e Ordem (Tema Dracula embutido/Github Dark)
          config_order: base.header, languages
          palette: github
